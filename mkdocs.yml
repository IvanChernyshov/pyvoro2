site_name: pyvoro2
site_description: Python bindings for Voro++ (2D/3D Voronoi and power/Laguerre tessellations) with periodic, topology, and inverse power-fitting utilities.
site_url: https://delonecommons.github.io/pyvoro2/
repo_url: https://github.com/DeloneCommons/pyvoro2
repo_name: DeloneCommons/pyvoro2
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_toc_entry: false
            heading_level: 2
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: .
      check_paths: true
  - pymdownx.arithmatex:
      generic: true
  - footnotes

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - User guide:
      - Concepts: guide/concepts.md
      - Domains (3D): guide/domains.md
      - Planar (2D): guide/planar.md
      - Operations: guide/operations.md
      - Topology and graphs: guide/topology.md
      - Power fitting: guide/powerfit.md
      - Visualization: guide/visualization.md
      - Notebooks: guide/notebooks.md
  - Examples:
      - notebooks/01_basic_compute.md
      - notebooks/02_periodic_graph.md
      - notebooks/03_locate_and_ghost.md
      - notebooks/04_powerfit.md
      - notebooks/05_visualization.md
      - notebooks/06_powerfit_reports.md
      - notebooks/07_powerfit_infeasibility.md
      - notebooks/08_powerfit_active_path.md
  - API reference:
      - Spatial (3D):
          - Domains: reference/domains.md
          - API: reference/api.md
          - Diagnostics: reference/diagnostics.md
          - Validation: reference/validation.md
          - Duplicate check: reference/duplicates.md
          - Normalization: reference/normalize.md
          - Face properties: reference/face_properties.md
          - Visualization (3D): reference/viz3d.md
      - Planar (2D):
          - Overview: reference/planar/index.md
          - Domains: reference/planar/domains.md
          - API: reference/planar/api.md
          - Diagnostics: reference/planar/diagnostics.md
          - Normalization: reference/planar/normalize.md
          - Validation: reference/planar/validation.md
          - Compute result: reference/planar/result.md
          - Edge properties: reference/edge_properties.md
          - Visualization (2D): reference/viz2d.md
      - Power fitting:
          - Overview: reference/powerfit/index.md
          - Constraints: reference/powerfit/constraints.md
          - Objective models: reference/powerfit/model.md
          - Solver: reference/powerfit/solver.md
          - Realization: reference/powerfit/realize.md
          - Active set: reference/powerfit/active.md
          - Reports: reference/powerfit/report.md
  - Project:
      - About: project/about.md
      - Changelog: about/changelog.md
      - License: project/license.md
      - AI usage: project/ai.md
      - Roadmap: project/roadmap.md
